name: vga-beta

services:
  app:
    image: "ghcr.io/vidya-gaem-awards/vga-remastered:main"
    environment:
      SSL_MODE: "mixed"
      AUTORUN_ENABLED: true
    env_file: .env.deployment

  cache:
    image: redis:7

  scheduler:
    image: "ghcr.io/vidya-gaem-awards/vga-remastered:main"
    command: [ "php", "/var/www/html/artisan", "schedule:work" ]
    stop_signal: SIGTERM
    healthcheck:
      test: [ "CMD", "healthcheck-schedule" ]
      start_period: 10s
    env_file: .env.deployment

networks:
  default:
    name: caddy_net
    external: true
